[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Default partition table's two OTA app slots are 1.25MB each, and the
; async networking stack (mbedTLS + ESPAsyncWebServer) alone used ~94% of
; that even before ESP-DASH was added (since removed). Nothing in this
; project uses a filesystem, so trade most of the (otherwise wasted) SPIFFS
; partition for bigger OTA app slots (1.875MB each) instead.
board_build.partitions = min_spiffs.csv
build_flags =
    -std=gnu++17
    ; Core 0 hosts WiFi/lwIP's own internal tasks (fixed by the precompiled
    ; framework). DisplayDriver::refreshTaskLoop() busy-loops forever with
    ; no yield and lives on core 1 (see Application::begin()) precisely so
    ; it never competes with core 0. Pin AsyncTCP's background task to core
    ; 0 explicitly too, alongside WiFi/lwIP, rather than leaving it at the
    ; default "-1: any available core" (which could otherwise let the
    ; scheduler place it on core 1 next to the non-yielding refresh task).
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=0
    ; ESPAsyncWebServer throttles any response bigger than
    ; CONFIG_LWIP_TCP_WND_DEFAULT to 2 "in-flight" chunks (~2*MSS each),
    ; waiting for a TCP ACK to free each credit before sending more (see
    ; AsyncAbstractResponse::write_send_buffs() in WebResponses.cpp). Ruled
    ; out as the cause of the slow throughput itself (disabling it didn't
    ; change the transfer rate), but keeping it disabled anyway: with it
    ; enabled, large responses occasionally cut off before completing ("end
    ; of response with N bytes missing"); disabled, the same transfer
    ; completes fully (just still slowly). Less relevant now that the
    ; heavy ESP-DASH page is gone and / is a small custom page, but no
    ; reason to revert it.
    -D ASYNCWEBSERVER_USE_CHUNK_INFLIGHT=0
lib_deps =
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    bblanchon/ArduinoJson@^7
; Global library storage on this machine has an ESP8266-targeted mbedtls
; port (from an unrelated project) that PlatformIO's dependency finder
; mis-matches against this ESP32-only project, duplicate-defining symbols
; already provided by the arduino-esp32 framework's own libmbedcrypto.a.
lib_ignore =
    esp_mbedtls_esp8266
