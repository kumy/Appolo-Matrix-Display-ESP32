<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiFi setup - matrix-display-2026</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
<div class="container" style="max-width: 420px;">
  <h3 class="mb-4">matrix-display-2026 &mdash; WiFi setup</h3>
  <p>Status: <span id="status">-</span></p>
  <form id="wifiForm">
    <label for="ssid" class="form-label">SSID</label>
    <input class="form-control mb-2" id="ssid" name="ssid">
    <label for="password" class="form-label">Password</label>
    <input class="form-control mb-3" id="password" name="password" type="password">
    <button type="submit" class="btn btn-primary btn-sm">Save &amp; Connect</button>
    <a href="/" class="btn btn-outline-secondary btn-sm">Back</a>
  </form>
  <p class="mt-3 text-body-secondary" id="savedMsg" style="display:none;">Saved. Reconnecting&hellip;</p>
</div>
<script>
fetch('/api/status').then(function (r) { return r.json(); }).then(function (data) {
  let text = data.apMode ? ('AP mode (' + data.ssid + ')') : data.wifiState;
  document.getElementById('status').textContent = text;
  if (!data.apMode) {
    document.getElementById('ssid').value = data.ssid;
  }
}).catch(function () {});

document.getElementById('wifiForm').addEventListener('submit', function (e) {
  e.preventDefault();
  const body = new URLSearchParams();
  body.set('ssid', document.getElementById('ssid').value);
  body.set('password', document.getElementById('password').value);
  fetch('/wifi', {method: 'POST', body: body}).then(function () {
    document.getElementById('savedMsg').style.display = 'block';
  }).catch(function () {});
});
</script>
</body>
</html>
